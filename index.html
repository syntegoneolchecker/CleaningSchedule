<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENG3-JP Cleaning Schedule</title>
    <link rel="stylesheet" href="styles.css?v=5">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; width: 90%; margin: 0 auto">
        <h1>ENG3-JP Cleaning Schedule</h1>
        <img src="Images/broomCleanFull.gif" alt="Cleaning gif" style="width:20%">
        </div>
    </header>

    <div class="content-layout">
        <div class="charts-side">
            <div class="chart-container">
                <h3>Assignment Heatmap</h3>
                <div id="heatmapWrapper" class="heatmap-wrapper">
                    <div class="history-empty">No data yet.</div>
                </div>
            </div>
            <div class="chart-container">
                <h3>Radar Overview</h3>
                <div id="radarWrapper" class="radar-wrapper">
                    <canvas id="radarChart"></canvas>
                    <div id="radarEmpty" class="history-empty">No data yet.</div>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="input-section">
                <h3>Configuration</h3>
                <div class="input-group">
                    <label for="namesInput">Names (space-separated):</label>
                    <input type="text" id="namesInput" placeholder="Name1 Name2 Name3 ...">
                </div>
                <div class="input-group">
                    <label for="jobsInput">Cleaning Areas (space-separated):</label>
                    <input type="text" id="jobsInput" placeholder="Area1 Area2 Area3 ...">
                </div>
                <div class="input-group">
                    <label>Or load from file:</label>
                    <input type="file" id="fileInput" accept=".txt">
                </div>
                <button id="generateBtn">Generate Schedule</button>
            </div>

            <div id="output" class="output-section" style="display: none;">
                <h3>Schedule Results</h3>
                <div class="info-section">
                    <h4>Names:</h4>
                    <div id="namesList" class="item-list"></div>
                </div>
                <div class="info-section">
                    <h4>Areas to clean:</h4>
                    <div id="jobsList" class="item-list"></div>
                </div>
                <div class="schedule-section">
                    <h4>Assignment:</h4>
                    <div id="assignmentList"></div>
                </div>
                <div class="info-section">
                    <h4>No cleaning:</h4>
                    <div id="noCleaningList" class="item-list"></div>
                </div>
            </div>

            <div id="error" class="error-section" style="display: none;"></div>
        </div>

        <div class="history-container">
            <h3>Schedule History</h3>
            <div id="historyList" class="history-list"></div>
            <button id="clearHistoryBtn">Clear History</button>
        </div>

        <img id="celebrationGif" src="Images/broomCleanFull.gif" alt="Cleaning celebration" class="celebration-gif">
    </div>

    <script src="script.js?v=5"></script>
</body>
</html>
